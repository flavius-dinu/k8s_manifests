apiVersion: v1
kind: Pod
metadata:
  name: lensagents-nginx-pod
  labels: { app: lensagents-nginx-pod }
spec:
  containers:
    - name: nginx
      image: nginx:stable-alpineee
      ports: [{ containerPort: 80 }]
      resources:
        requests: { cpu: 10m, memory: 16Mi }
        limits: { cpu: 100m, memory: 64Mi }
