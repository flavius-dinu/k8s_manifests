# Child app #3: manifests from an EXTERNAL git repo (the classic ArgoCD guestbook).
# Demonstrates that child apps can point anywhere, not just this repo.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: lensagents-guestbook
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/argoproj/argocd-example-apps.git
    targetRevision: HEAD
    path: guestbook
  destination:
    server: https://kubernetes.default.svc
    namespace: lademo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
